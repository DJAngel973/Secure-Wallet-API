
services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-wallet-db
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      POSTGRES_LOGGING_COLLECTOR: "on"

    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ${FILE_DATA_POSTGRES}:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      # Resource limits (prevents DoS attacks)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: secure-wallet-pgadmin
    restart: no
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 30
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: "Secure Wallet API - Development Only"
    ports:
      - "5050:80"
    networks:
      - wallet-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

networks:
  wallet-network:
    driver: bridge